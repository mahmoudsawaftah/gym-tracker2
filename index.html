<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>برنامجي | Iron Log</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@600;700;800&family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0B0D10;
    --surface:#15181D;
    --surface-2:#1D2127;
    --line:#262B32;
    --text:#EDEEF0;
    --muted:#8A8F98;
    --accent:#E8A33D;
    --accent-dim:#4a3a1f;
    --accent-2:#3DA9E8;
    --danger:#E8543D;
    --success:#4CAF7D;
  }
  *{box-sizing:border-box;}
  body{
    margin:0; background:var(--bg); color:var(--text);
    font-family:'Tajawal',sans-serif; padding-bottom:120px;
    -webkit-tap-highlight-color:transparent;
  }
  h1,h2,h3,.disp{font-family:'Cairo',sans-serif;}
  a{color:inherit;}

  /* ---- Top bar ---- */
  header{
    position:sticky; top:0; z-index:20;
    background:rgba(11,13,16,.92); backdrop-filter:blur(10px);
    border-bottom:1px solid var(--line);
    padding:14px 16px 10px;
  }
  .brand{display:flex; align-items:center; justify-content:space-between;}
  .brand h1{font-size:20px; font-weight:800; margin:0; letter-spacing:.3px;}
  .brand h1 span{color:var(--accent);}
  .plate{
    width:40px; height:40px; border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    font-size:11px; font-weight:700; color:var(--accent);
    background:conic-gradient(var(--accent) calc(var(--pct,0)*1%), var(--surface-2) 0);
    position:relative;
  }
  .plate::after{
    content:""; position:absolute; inset:5px; border-radius:50%;
    background:var(--bg);
  }
  .plate b{position:relative; z-index:1;}

  /* ---- Day tabs ---- */
  .tabs{display:flex; gap:8px; overflow-x:auto; margin-top:12px; padding-bottom:4px; scrollbar-width:none;}
  .tabs::-webkit-scrollbar{display:none;}
  .tab{
    flex:0 0 auto; padding:8px 16px; border-radius:999px;
    background:var(--surface); border:1px solid var(--line);
    color:var(--muted); font-size:13px; font-weight:700; cursor:pointer;
    white-space:nowrap; transition:.15s;
  }
  .tab.active{background:var(--accent); color:#191204; border-color:var(--accent);}

  main{padding:16px; max-width:640px; margin:0 auto;}
  .day-title{font-size:15px; color:var(--muted); margin:4px 0 16px; display:flex; justify-content:space-between; align-items:center;}
  .day-title b{color:var(--text); font-family:'Cairo',sans-serif;}

  /* ---- Exercise card ---- */
  .card{
    background:var(--surface); border:1px solid var(--line);
    border-radius:16px; padding:14px 16px; margin-bottom:12px;
  }
  .card.done{border-color:var(--success); box-shadow:0 0 0 1px var(--success) inset;}
  .card-top{display:flex; justify-content:space-between; align-items:flex-start; gap:10px;}
  .ex-name{font-family:'Cairo',sans-serif; font-weight:700; font-size:16px; margin:0;}
  .ex-name small{display:block; font-family:'Tajawal',sans-serif; font-weight:400; color:var(--muted); font-size:12px; margin-top:2px;}
  .chk{
    width:26px; height:26px; border-radius:50%; border:2px solid var(--line);
    flex:0 0 auto; display:flex; align-items:center; justify-content:center;
    cursor:pointer; color:transparent; font-size:14px; user-select:none;
  }
  .card.done .chk{background:var(--success); border-color:var(--success); color:#08130d;}

  .meta{display:flex; flex-wrap:wrap; gap:6px; margin:10px 0;}
  .pill{background:var(--surface-2); color:var(--muted); font-size:11px; padding:4px 9px; border-radius:8px;}
  .pill.warn{background:#3a2412; color:var(--accent);}

  .muscle-line{font-size:12.5px; color:var(--muted); line-height:1.7; margin:8px 0;}
  .muscle-line b{color:var(--text);}

  .row{display:flex; gap:8px; align-items:center; margin-top:10px;}
  .log input{
    width:100%; background:var(--surface-2); border:1px solid var(--line);
    color:var(--text); border-radius:10px; padding:9px 10px; font-size:13px; font-family:'Tajawal';
  }
  .log label{font-size:10px; color:var(--muted); display:block; margin-bottom:3px;}
  .log-grid{display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-top:8px;}

  .btnrow{display:flex; gap:8px; margin-top:12px;}
  .btn{
    flex:1; text-align:center; padding:10px; border-radius:10px;
    font-size:13px; font-weight:700; cursor:pointer; border:1px solid var(--line);
    background:var(--surface-2); color:var(--text); text-decoration:none;
  }
  .btn.video{background:var(--accent); color:#191204; border-color:var(--accent);}
  .btn.pr{background:transparent; color:var(--accent-2); border-color:var(--accent-2);}

  .note{font-size:12px; color:var(--muted); margin-top:10px; border-top:1px dashed var(--line); padding-top:8px;}
  .verify-tag{font-size:10px; padding:2px 7px; border-radius:6px; margin-right:6px;}
  .v-high{background:#1c3a2a; color:var(--success);}
  .v-fallback{background:#2a2418; color:var(--accent);}

  /* ---- Rest timer floating ---- */
  .timer-fab{
    position:fixed; bottom:18px; left:50%; transform:translateX(-50%);
    background:var(--surface); border:1px solid var(--line); border-radius:20px;
    padding:10px 14px; display:flex; align-items:center; gap:10px; z-index:30;
    box-shadow:0 8px 24px rgba(0,0,0,.5); min-width:280px; max-width:92vw;
  }
  .timer-num{font-family:'Cairo'; font-size:22px; font-weight:800; min-width:56px; text-align:center;}
  .timer-presets{display:flex; gap:5px; flex:1;}
  .timer-presets button{
    background:var(--surface-2); color:var(--muted); border:none; border-radius:8px;
    padding:6px 0; flex:1; font-size:11px; font-weight:700; cursor:pointer;
  }
  .timer-presets button.on{background:var(--accent); color:#191204;}
  .timer-go{background:var(--accent-2); color:#04202e; border:none; border-radius:10px; width:38px; height:38px; font-size:16px; cursor:pointer;}

  /* ---- Progress page ---- */
  .stat-card{background:var(--surface); border:1px solid var(--line); border-radius:16px; padding:16px; margin-bottom:14px;}
  .stat-card h3{margin:0 0 12px; font-size:14px; color:var(--muted);}
  canvas{width:100%; height:180px; display:block;}

  .empty{color:var(--muted); font-size:13px; text-align:center; padding:40px 10px;}
  .hidden{display:none !important;}
</style>
</head>
<body>

<header>
  <div class="brand">
    <h1>Iron <span>Log</span></h1>
    <div class="plate" id="weekPlate" style="--pct:0"><b id="weekPct">0%</b></div>
  </div>
  <div class="tabs" id="dayTabs"></div>
</header>

<main id="app"></main>

<div class="timer-fab">
  <div class="timer-num" id="timerNum">60</div>
  <div class="timer-presets">
    <button data-t="45">45</button>
    <button data-t="60" class="on">60</button>
    <button data-t="90">90</button>
    <button data-t="120">120</button>
  </div>
  <button class="timer-go" id="timerGo">▶</button>
</div>

/* ===================== STATE / STORAGE ===================== */
const LS_KEY = "ironlog_v1";
function loadState(){ try{ return JSON.parse(localStorage.getItem(LS_KEY)) || {}; }catch(e){ return {}; } }
function saveState(s){ localStorage.setItem(LS_KEY, JSON.stringify(s)); }
let state = loadState();

function todayKey(){ return new Date().toISOString().slice(0,10); }

function getLog(exId){
  const day = state[todayKey()] || {};
  return day[exId] || {done:false, weight:"", reps:""};
}
function setLog(exId, patch){
  const tk = todayKey();
  state[tk] = state[tk] || {};
  state[tk][exId] = Object.assign(getLog(exId), patch);
  saveState(state);
}

/* ===================== RENDER ===================== */
let activeDay = DAYS[0].key;

function renderTabs(){
  const el = document.getElementById("dayTabs");
  el.innerHTML = "";
  DAYS.forEach(d=>{
    const b = document.createElement("div");
    b.className = "tab" + (d.key===activeDay ? " active":"");
    b.textContent = d.label + " · " + d.sub;
    b.onclick = ()=>{ activeDay = d.key; render(); };
    el.appendChild(b);
  });
}

function verifyBadge(v){
  if(v==="high") return '<span class="verify-tag v-high">✓ مصدر مؤكد</span>';
  return '<span class="verify-tag v-fallback">🔍 بديل موثوق</span>';
}

function renderDay(){
  const day = DAYS.find(d=>d.key===activeDay);
  const app = document.getElementById("app");
  const doneCount = day.exercises.filter(e=>getLog(e.id).done).length;
  let html = `<div class="day-title"><span><b>${day.sub}</b> — ${day.exercises.length} حركات</span><span>${doneCount}/${day.exercises.length} ✅</span></div>`;

  day.exercises.forEach(ex=>{
    const log = getLog(ex.id);
    html += `
    <div class="card ${log.done?'done':''}" id="card-${ex.id}">
      <div class="card-top">
        <div class="ex-name">${ex.ar}<small>${ex.en}</small></div>
        <div class="chk" onclick="toggleDone('${ex.id}')">${log.done?'✓':''}</div>
      </div>
      <div class="meta">
        <span class="pill">${ex.sets}</span>
        <span class="pill">راحة ${ex.rest}</span>
        ${verifyBadge(ex.verify)}
      </div>
      <div class="muscle-line"><b>العضلة المستهدفة:</b> ${ex.muscle}</div>
      <div class="log-grid">
        <div class="log"><label>الوزن (كغ)</label><input type="number" inputmode="decimal" value="${log.weight}" onchange="updateLog('${ex.id}','weight',this.value)"></div>
        <div class="log"><label>العدات المنفذة</label><input type="number" inputmode="numeric" value="${log.reps}" onchange="updateLog('${ex.id}','reps',this.value)"></div>
      </div>
      <div class="btnrow">
        <a class="btn video" target="_blank" rel="noopener" href="${ex.video}">🎬 شاهد الحركة</a>
      </div>
      <div class="note">💡 ${ex.tip}</div>
    </div>`;
  });

  app.innerHTML = html;
  updateWeekPlate();
}

function toggleDone(id){
  const cur = getLog(id);
  setLog(id, {done: !cur.done});
  renderDay();
}
function updateLog(id, field, val){
  setLog(id, {[field]: val});
}

function updateWeekPlate(){
  let total=0, done=0;
  DAYS.forEach(d=> d.exercises.forEach(e=>{
    total++;
    if(getLog(e.id).done) done++;
  }));
  const pct = total? Math.round(done/total*100) : 0;
  document.getElementById("weekPlate").style.setProperty("--pct", pct);
  document.getElementById("weekPct").textContent = pct+"%";
}

function render(){ renderTabs(); renderDay(); }
render();

/* ===================== REST TIMER ===================== */
let timerSeconds = 60, timerInterval = null, timerRunning = false;
const timerNumEl = document.getElementById("timerNum");
document.querySelectorAll(".timer-presets button").forEach(btn=>{
  btn.onclick = ()=>{
    document.querySelectorAll(".timer-presets button").forEach(b=>b.classList.remove("on"));
    btn.classList.add("on");
    timerSeconds = parseInt(btn.dataset.t);
    timerNumEl.textContent = timerSeconds;
    clearInterval(timerInterval); timerRunning=false;
    document.getElementById("timerGo").textContent="▶";
  };
});
function beep(){
  try{
    const ctx = new (window.AudioContext||window.webkitAudioContext)();
    const o = ctx.createOscillator(); const g = ctx.createGain();
    o.connect(g); g.connect(ctx.destination);
    o.frequency.value = 880; g.gain.value = 0.15;
    o.start(); setTimeout(()=>{o.stop(); ctx.close();}, 300);
  }catch(e){}
}
document.getElementById("timerGo").onclick = function(){
  if(timerRunning){
    clearInterval(timerInterval); timerRunning=false; this.textContent="▶";
    return;
  }
  timerRunning = true; this.textContent="⏸";
  timerInterval = setInterval(()=>{
    timerSeconds--;
    timerNumEl.textContent = Math.max(timerSeconds,0);
    if(timerSeconds<=0){
      clearInterval(timerInterval); timerRunning=false;
      document.getElementById("timerGo").textContent="▶";
      beep();
      const activeBtn = document.querySelector(".timer-presets button.on");
      timerSeconds = activeBtn? parseInt(activeBtn.dataset.t) : 60;
      timerNumEl.textContent = timerSeconds;
    }
  }, 1000);
};
</script>
